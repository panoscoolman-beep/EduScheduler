services:
  db:
    image: postgres:16-alpine
    container_name: edscheduler-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edscheduler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-edscheduler}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edscheduler}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edscheduler-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edscheduler-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8000"
    volumes:
      - ./frontend:/app/frontend
    networks:
      - edscheduler-net

networks:
  edscheduler-net:
    driver: bridge

volumes:
  postgres_data:
